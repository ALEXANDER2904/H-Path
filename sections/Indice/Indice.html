<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indice</title>
    <link rel="stylesheet" href="Indice.css" />
</head>
<body>

    <section class="indice">

        <div class="izquierda">
            <div class="encabezado">
                <h1 class="titulo">Index</h1>
                <div class="barra"></div>
            </div>
        </div>

        <div class="derecha">
            <div class="grid-viewport">
                <div class="indice-grid" id="indiceGrid"></div>
            </div>
            <div class="indice-controls">
                <button type="button" id="btnPrev">
                    <svg class="btn-izquierda" viewBox="0 0 1024 1024" aria-hidden="true" focusable="false">
                        <path d="M768 903.232l-50.432 56.768L256 512l461.568-448 50.432 56.768L364.928 512z"/>
                    </svg>
                </button>

                <button type="button" id="btnNext">
                    <svg class="btn-derecha" viewBox="0 0 1024 1024" aria-hidden="true" focusable="false">
                        <path d="M256 120.768L306.432 64 768 512l-461.568 448L256 903.232 659.072 512z"/>
                    </svg>
                </button>
            </div>
        </div>

    </section>

    <script type="module" src="Indice.js"></script>
</body>
</html>
